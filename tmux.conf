# Key bindings
set -g prefix C-t
unbind-key C-b

bind-key r source-file ~/.config/tmux/tmux.conf

set -g escape-time 0

set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on

# Default shell
set -g default-shell /usr/bin/fish
set -g default-command /usr/bin/fish

# Color settings
set-option -g default-terminal 'screen-256color'
set -g terminal-overrides ',alacritty:RGB'

set -g set-titles on
set -g set-titles-string "#T"

set-option -g status-interval 1 

set-option -g status-justify 'left'

set-option -g status-bg '#2E3440'
set-option -g status-fg '#D8DEE9'

set-option -g status-left-length 100
set-option -g status-left '#[fg=#2E3440]#[bg=#88C0D0]#[bold] #h #[default]#[fg=#2E3440]#[bg=#88C0D0] #S #[fg=#88C0D0]#[bg=#2E3440] '

set-window-option -g window-status-current-format '#[fg=#2E3440]#[bg=#4C566A]#[default]#[fg=#D8DEE8]#[bg=#4C566A] #I  #W #[fg=#4C566A]#[bg=#2E3440]'
set-window-option -g window-status-format '#[fg=#D8DEE9]#[bg=#2E3440]  #I  #W  '

set-option -g status-right-length 100
set-option -g status-right '#[fg=#4C566A]#[bg=#2E3440]#[default]#[fg=#D8DEE9]#[bg=#4C566A] #(date +"%Y/%m/%d (%a)  %H:%M") '

# Key bindings
set -g prefix C-t

unbind C-b

# Color settings
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'

set-option -g status-interval 1 

# set-option -g status-justify "centre"

set-option -g status-bg "#F0F0F0"
set-option -g status-fg "#494B53"

set-option -g status-left-length 100
set-option -g status-left "#[fg=#F0F0F0,bg=#50A14F] Session: #S #[default]"

set-window-option -g window-status-current-format "#[fg=#494B53,bg=#D0D0D0,bold] #I: #W "
set-window-option -g window-status-format "#[fg=#494B53,bg=#F0F0F0,default] #I: #W "

set-option -g status-right-length 100
set-option -g status-right "#[fg=#494B53,bg=#D0D0D0,italics] #h "

# Keyboard shortcuts
set -g prefix C-x
unbind-key C-b

# Split window vertical
bind h split-window -h

# Split window horizontal
bind v split-window -v

bind-key r source-file ~/.config/tmux/tmux.conf

set -g escape-time 1

set -g base-index 1
set -g pane-base-index 1

set -g renumber-windows on

set -g default-shell /usr/bin/fish
set -g default-command /usr/bin/fish

set -g default-terminal 'screen-256color'
set -g terminal-overrides ',xterm-256color:RGB'

set -g set-titles on
set -g set-titles-string "#T"

set -g status-interval 1

set -g status-bg lightgrey
set -g status-fg black

set -g status-left-length 100
set -g status-right-length 100

set -g status-left '#[fg=grey,bg=blue] #S #[fg=blue,bg=lightgrey]'
# set -g status-left '#[bg=cyan] #h | #S '

set -g status-justify 'left'
set -g window-status-format '  #I  #W  '
set -g window-status-current-format '#[fg=lightgrey,bg=darkgrey] #[fg=black]#I  #W #[fg=darkgrey,bg=lightgrey]'
# set -g window-status-format ' #I | #W '
# set -g window-status-current-format '#[bg=grey] #I | #W '

set -g status-right '#[fg=cyan]#[fg=black,bg=cyan] #h '
# set -g status-right '#[bg=grey] #(date +"%Y/%m/%d (%a) | %H:%M") '
